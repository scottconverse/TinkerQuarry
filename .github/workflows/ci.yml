name: CI

# ============================================================================================
# THIS IS THE MERGE GATE, NOT THE RELEASE PROOF. Read .github/workflows/release-gate.yml
# for the other half — it explains why the difference matters and what happened when nobody
# wrote it down (gate finding TEST-2: the full release proof had run zero times in Actions).
#
# A green run of this workflow means: the UI and web suites pass, the engine's fast Python
# lane passes, licences are clean, and changed engine lines are covered. It does NOT mean the
# app builds, that the Rust/Tauri side works, that Playwright passes, or that the installer
# installs. Those live in release-gate.yml and are listed there by name.
#
# Below is the other side of that ledger: the parts of the full `pnpm test:release` proof
# that this workflow really does cover. Each entry points at the job and step that covers it,
# and scripts/check_release_gate_wiring.py (run in the release-wiring job) fails if that step
# is renamed or deleted — a coverage claim has to stay true, or it is worse than no claim.
#
# BEGIN RELEASE-PROOF-MAP: covered-in-ci
#   lint                      -> frontend / UI lint  (apps/ui only; the release lane's `pnpm -r lint` also covers apps/web and packages/*)
#   type-check                -> frontend / UI type check  (apps/ui only; same gap as lint)
#   jest.js                   -> frontend / Full UI unit tests (non-live lane)  (engineLive.integration is deselected via TQ_CI_NO_LIVE — hosted runners have no engine venv to spawn)
#   test:web:unit             -> frontend / Full web tests  (full parity with the release lane)
#   run-engine-pytest.mjs     -> engine / Engine non-live test lane (with coverage)  (marker-filtered and without --strict-no-skips; the live/real_tool/needs_cadquery classes — including the Ollama-backed vocabulary tests whose failures produced PRs #26/#27/#30 — run only in release-gate.yml)
# END RELEASE-PROOF-MAP
# ============================================================================================

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-wiring:
    name: Release-gate wiring
    # Cheap (seconds, no toolchain) and deliberately first: it is the check that keeps the
    # CI-vs-release-proof distinction honest as both workflows change.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: python -m pip install --upgrade "pyyaml>=6.0"
      - name: Release-gate wiring (automatic trigger, coverage map, signing gate)
        run: python scripts/check_release_gate_wiring.py
      - name: No committed SPA bundle under the engine package
        # WALK-3: a pre-built copy of the UI used to be committed at
        # packages/engine/src/kimcad/web/ and served by `kimcad web`. Nothing checked its
        # freshness, so it drifted eight PRs behind apps/ui/src and served a UI that no longer
        # existed. It was deleted; this keeps it deleted.
        run: python scripts/check_no_committed_spa_bundle.py


  frontend:
    name: Frontend and web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Use a node-gyp that knows Visual Studio 2026
        # The windows-2025 runner image ships VS 2026, which pnpm's bundled node-gyp 11.x
        # cannot discover (nodejs/node-gyp#3282, pnpm/pnpm#10268) — tree-sitter-openscad's
        # source build then fails the install. node-gyp >= 12.1.0 fixes discovery.
        run: |
          npm install -g node-gyp@latest
          $gyp = Join-Path (npm root -g) "node-gyp\bin\node-gyp.js"
          if (-not (Test-Path $gyp)) { throw "node-gyp not found at $gyp" }
          "npm_config_node_gyp=$gyp" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: UI lint
        run: pnpm --dir apps/ui lint

      - name: UI type check
        run: pnpm --dir apps/ui type-check

      - name: Full UI unit tests (non-live lane)
        # v1.5 CI expansion: the focused 3-file lane was a historical artifact — the full
        # suite (94 suites / 670 tests) is green and runs in ~90 s locally.
        # No `--` separator: pnpm 10 forwards it literally and jest then reads the args as
        # a test-name pattern (0 matches -> exit 1). Caught live on this PR's first CI run.
        # engineLive.integration is DESELECTED via TQ_CI_NO_LIVE (not skipped — the no-skips
        # reporter forbids green-by-skip): hosted runners have no engine venv to spawn. This
        # mirrors the engine lane's `-m "not live"`; the live file still runs locally and in
        # the self-hosted release proof. Config-level, because the CLI flag REPLACES the
        # whole ignore list (proven locally: 810 tests collected, 68 red).
        run: pnpm --dir apps/ui test --runInBand --ci
        env:
          TQ_CI_NO_LIVE: "1"

      - name: Web build
        run: pnpm --dir apps/web build

      - name: Full web tests
        run: pnpm --dir apps/web test --runInBand --ci

  engine:
    name: Engine smoke
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the merge-base with main to compute changed-line coverage
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e ".[dev]"

      - name: License gate (GPL-2.0-only bundle — v1.5-1)
        # Fails on: openai/distro present anywhere in the venv; manifold3d/cadquery imported
        # by in-process engine code (workers only); any shipped dep without an allowlisted
        # GPL-2.0-compatible license. See scripts/license_scan.py.
        run: python ../../scripts/license_scan.py

      - name: Engine non-live test lane (with coverage)
        # -rs surfaces every skip reason: this lane may skip env-dependent tests (no bundled
        # tools on hosted runners), and the log should say exactly which and why.
        run: >
          python -m pytest
          tests
          -m "not live and not real_tool and not needs_cadquery"
          -q -rs
          --cov=kimcad --cov-report=xml

      - name: Diff coverage gate (PRs — changed engine lines must be tested)
        if: github.event_name == 'pull_request'
        # v1.5 CI expansion: >=80% of changed executable lines under packages/engine must be
        # covered by the lane above. Doc/workflow-only PRs pass trivially (empty diff).
        # *_worker.py files are excluded: they execute in child processes where coverage
        # can't trace (validated: manifold_worker showed 13% despite real subprocess tests);
        # their behavior is proven by the tests that drive the actual worker process.
        run: python -m diff_cover.diff_cover_tool coverage.xml --compare-branch origin/${{ github.base_ref }} --fail-under 80 --exclude "**/*_worker.py"
