name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend and web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Use a node-gyp that knows Visual Studio 2026
        # The windows-2025 runner image ships VS 2026, which pnpm's bundled node-gyp 11.x
        # cannot discover (nodejs/node-gyp#3282, pnpm/pnpm#10268) — tree-sitter-openscad's
        # source build then fails the install. node-gyp >= 12.1.0 fixes discovery.
        run: |
          npm install -g node-gyp@latest
          $gyp = Join-Path (npm root -g) "node-gyp\bin\node-gyp.js"
          if (-not (Test-Path $gyp)) { throw "node-gyp not found at $gyp" }
          "npm_config_node_gyp=$gyp" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: UI lint
        run: pnpm --dir apps/ui lint

      - name: UI type check
        run: pnpm --dir apps/ui type-check

      - name: Focused UI unit tests
        run: >
          pnpm --dir apps/ui test -- --runTestsByPath
          src/components/__tests__/WelcomeScreen.test.tsx
          src/components/__tests__/AiPromptPanel.test.tsx
          src/services/__tests__/engineClient.test.ts
          --runInBand

      - name: Web build
        run: pnpm --dir apps/web build

      - name: Focused web share tests
        run: >
          pnpm --dir apps/web test -- --runTestsByPath
          functions/_lib/__tests__/share.test.ts
          functions/api/__tests__/share.test.ts
          --runInBand

  engine:
    name: Engine smoke
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e ".[dev]"

      - name: Engine non-live test lane
        # -rs surfaces every skip reason: this lane may skip env-dependent tests (no bundled
        # tools on hosted runners), and the log should say exactly which and why.
        run: >
          python -m pytest
          tests
          -m "not live and not real_tool and not needs_cadquery and not needs_browser"
          -q -rs
