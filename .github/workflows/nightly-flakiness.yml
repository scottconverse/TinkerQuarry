# Nightly flakiness lane (v1.5): the audit's point was that one green run proves
# determinism-of-claim, not determinism-of-behavior. Run the same suites N=5 times and
# publish a per-test verdict table; any test that flaps (or fails consistently) turns the
# nightly red. Engine gets per-test granularity via pytest's junit output; the UI lane is
# run-level (5 exit codes) — per-test jest granularity would need a junit reporter dep.
name: Nightly flakiness
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  engine-flakiness:
    name: Engine suite x5 (per-test table)
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e ".[dev]"
      - name: Run the non-live lane 5 times
        shell: pwsh
        # Each run may fail (that is the point); collect all five junit files regardless.
        run: |
          foreach ($i in 1..5) {
            python -m pytest tests -m "not live and not real_tool and not needs_cadquery and not needs_browser" -q --junitxml="flaky-run$i.xml"
            Write-Output "run $i exit: $LASTEXITCODE"
          }
          exit 0
      - name: Fold into the flakiness table (fails on flaky/always-fail)
        run: python ../../scripts/flakiness_table.py --out engine-flakiness.md flaky-run1.xml flaky-run2.xml flaky-run3.xml flaky-run4.xml flaky-run5.xml
      - name: Upload table
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-flakiness-table
          path: packages/engine/engine-flakiness.md

  ui-flakiness:
    name: UI suite x5 (run-level)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Use a node-gyp that knows Visual Studio 2026
        run: |
          npm install -g node-gyp@latest
          $gyp = Join-Path (npm root -g) "node-gyp\bin\node-gyp.js"
          if (-not (Test-Path $gyp)) { throw "node-gyp not found at $gyp" }
          "npm_config_node_gyp=$gyp" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the full UI suite 5 times
        shell: pwsh
        run: |
          $codes = @()
          foreach ($i in 1..5) {
            pnpm --dir apps/ui test -- --runInBand --ci
            $codes += $LASTEXITCODE
            Write-Output "run $i exit: $($codes[-1])"
          }
          $distinct = $codes | Sort-Object -Unique
          Write-Output "exit codes: $($codes -join ', ')"
          if ($distinct.Count -gt 1) { Write-Error "UI suite is FLAKY (mixed exit codes)"; exit 1 }
          if ($distinct[0] -ne 0) { Write-Error "UI suite fails consistently"; exit 1 }
