name: Release Gate

on:
  workflow_dispatch:

jobs:
  windows-release-gate:
    name: Windows release gate
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full local release proof
        run: pnpm.cmd test:release

      - name: Upload native release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tinkerquarry-windows-release-artifacts
          path: |
            apps/ui/src-tauri/target/release/bundle/**/*.msi
            apps/ui/src-tauri/target/release/bundle/**/*.exe
            playwright-report/**
          if-no-files-found: warn
