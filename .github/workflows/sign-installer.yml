name: Sign installer

# Signs a release installer with Azure Trusted Signing. Release builds are made
# locally (NSIS path-length constraint), so this runs on demand against a draft
# release: download the unsigned exe -> Azure signs it with its HSM-held key ->
# verify -> recompute checksums -> re-upload. Checksums are regenerated AFTER
# signing because signing changes the file hash.
#
# Run with no tag to smoke-test the signing chain: it signs a scratch exe and
# touches no release.

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag holding the unsigned installer (e.g. v1.5.0). Leave empty for a smoke test that signs a scratch exe and touches no release."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  # Gate finding TEST-2: v1.5.0 was built, signed and published without the full release
  # proof ever having run in Actions — release-gate.yml was workflow_dispatch-only and had
  # zero runs, ever. Signing is the last point where that is still catchable, so it is
  # caught here: no successful release-gate run at this tag's exact commit, no signature.
  #
  # There is deliberately no override input. The escape hatch is the correct route: run
  # release-gate.yml against the tag (it also runs automatically on every `v*` tag push),
  # wait for it to go green, then sign.
  release-gate-proof:
    name: Release gate passed at this tag's commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Require a successful release-gate run at the tag's exact commit
        # Skipped for the no-tag smoke test, which signs a scratch exe and touches no release.
        if: inputs.release-tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.release-tag }}
        run: |
          set -uo pipefail
          # Deliberately NOT `set -e`: every failure below must exit through an explicit
          # branch that prints why. Under `set -e` a failing `gh api` inside a command
          # substitution kills the script before its own error message is emitted, which
          # turns "this tag is unproven" into an unexplained red X.

          runs_url="repos/$REPO/actions/workflows/release-gate.yml/runs?head_sha=%s&per_page=100"

          if ! sha=$(gh api "repos/$REPO/commits/$TAG" --jq '.sha') || [ -z "$sha" ]; then
            echo "::error::Could not resolve tag '$TAG' to a commit in $REPO. Check the tag exists and was pushed."
            exit 1
          fi
          echo "tag $TAG -> commit $sha"

          # EVERY release tag in this repo is ANNOTATED, so the ref points at a tag OBJECT whose
          # sha differs from the commit's (v1.5.0: ref object 735d816f..., commit f3d3b903...).
          # `commits/$TAG` above dereferences to the commit. But release-gate.yml is triggered by
          # `push: tags: v*`, and it is NOT settled which of the two shas Actions records as a
          # tag-push run's head_sha — this repo has no tag-push run in its history to check
          # against, and guessing wrong makes this gate permanently unsatisfiable: no run would
          # ever match, so no release could ever be signed by the intended route.
          #
          # Rather than bet on the answer, accept a successful run at EITHER sha. Both identify
          # the same tag, so nothing is loosened: a run on some OTHER commit still fails.
          tag_obj=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.sha' 2>/dev/null || echo "")
          if [ -n "$tag_obj" ] && [ "$tag_obj" != "$sha" ]; then
            echo "annotated tag: ref object $tag_obj dereferences to commit $sha; accepting either"
          fi

          # head_sha pins the answer to THIS tag. A green release-gate run on some other
          # commit — main, a branch, last week's tag — proves nothing about what is about to
          # be signed, which is exactly how a stale proof would sneak through.
          runs=0
          for candidate in $sha $tag_obj; do
            # shellcheck disable=SC2059
            url=$(printf "$runs_url" "$candidate")
            if ! n=$(gh api "$url" --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'); then
              echo "::error::Could not query release-gate.yml runs for $candidate. Refusing to sign an installer whose release proof cannot be confirmed."
              exit 1
            fi
            echo "successful release-gate runs at $candidate: $n"
            runs=$((runs + n))
          done
          echo "successful release-gate runs for tag $TAG (either sha): $runs"

          if [ "$runs" -eq 0 ]; then
            echo "::error::No successful release-gate.yml run exists for $TAG ($sha). This installer has NOT been release-proven: the full pnpm test:release lane (Rust tests, cargo audit, Playwright, the full engine pytest, the native build and both installed-binary smoke tests) has not passed on this commit. Refusing to sign."
            echo "release-gate runs found at this commit (if any):"
            gh api "$url" --jq '.workflow_runs[] | "  \(.status)/\(.conclusion // "pending")  \(.html_url)"' || echo "  <none>"
            echo "Fix: run the 'Release Gate' workflow against $TAG, wait for it to go green, then re-run this."
            exit 1
          fi

          echo "release-gate proof found for $TAG ($sha) - proceeding to sign."

  sign:
    needs: release-gate-proof
    runs-on: windows-latest
    steps:
      # Standing rule (all repos): prove the service-principal secret is valid in
      # seconds, before any longer work, by hitting the AAD token endpoint directly.
      - name: Azure token preflight (fail fast)
        shell: pwsh
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $body = @{
            client_id     = $env:CLIENT_ID
            client_secret = $env:CLIENT_SECRET
            grant_type    = 'client_credentials'
            scope         = 'https://codesigning.azure.net/.default'
          }
          try {
            Invoke-RestMethod -Method Post -Uri "https://login.microsoftonline.com/$env:TENANT_ID/oauth2/v2.0/token" -Body $body -ErrorAction Stop | Out-Null
            Write-Host "Preflight token acquired."
          } catch {
            # Any structured AAD error response is a definitive config/credential
            # failure (bad secret, bad client id, bad tenant, ...) except AAD's one
            # transient code. Warn-and-continue is reserved for a response-less
            # network-level failure - the signing step is the real test there.
            $msg = "$($_.ErrorDetails.Message)"
            if ($msg -and $msg -notmatch 'temporarily_unavailable') {
              Write-Error "Azure credential preflight failed: $msg"
              exit 1
            }
            Write-Warning "Preflight inconclusive (no AAD response): $($_.Exception.Message) - continuing"
          }

      - name: Get file to sign
        id: get
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release-tag }}
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          if ($env:TAG) {
            gh release download $env:TAG --repo ${{ github.repository }} --pattern '*-setup.exe' --dir artifacts
            if ($LASTEXITCODE -ne 0) { exit 1 }
            $exes = @(Get-ChildItem artifacts -Filter *.exe)
            if ($exes.Count -ne 1) {
              Write-Error "expected exactly 1 installer exe on release $env:TAG, found $($exes.Count) - refusing to guess which to sign"
              exit 1
            }
            $exe = $exes[0]
          } else {
            Set-Content smoke.cs 'class Smoke { static void Main() {} }'
            $csc = Get-ChildItem "$env:WINDIR\Microsoft.NET\Framework64\v4*\csc.exe" | Select-Object -First 1
            & $csc.FullName /nologo /out:artifacts\smoke-test.exe smoke.cs
            if ($LASTEXITCODE -ne 0) { exit 1 }
            $exe = Get-Item artifacts\smoke-test.exe
          }
          "exe=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Sign with Azure Trusted Signing
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://wcus.codesigning.azure.net
          signing-account-name: scottconverse-signing
          certificate-profile-name: ScottConversePublic
          files: ${{ steps.get.outputs.exe }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signature
        shell: pwsh
        env:
          EXE: ${{ steps.get.outputs.exe }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          $out = & $signtool.FullName verify /pa /v $env:EXE 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "signature verification failed"; exit 1 }
          # exit code alone does not prove a timestamp exists; require it explicitly
          if ($out -notmatch 'The signature is timestamped') {
            Write-Error "signature verified but no timestamp found - failing"
            exit 1
          }

      - name: Re-hash and update release assets
        if: inputs.release-tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release-tag }}
          EXE: ${{ steps.get.outputs.exe }}
          EXE_NAME: ${{ steps.get.outputs.exe_name }}
        run: |
          $name = $env:EXE_NAME
          $hash = (Get-FileHash $env:EXE -Algorithm SHA256).Hash.ToLower()

          gh release download $env:TAG --repo ${{ github.repository }} --pattern SHA256SUMS.txt --pattern release-manifest.json --dir artifacts --clobber
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Exact filename-field match; anything but exactly one replaced line means
          # the release assets do not look like we expect - stop before uploading.
          $matched = 0
          $sums = Get-Content artifacts\SHA256SUMS.txt | ForEach-Object {
            if (($_ -split '\s+', 2)[1] -eq $name) { $matched++; "$hash  $name" } else { $_ }
          }
          if ($matched -ne 1) {
            Write-Error "expected exactly 1 SHA256SUMS.txt line for $name, matched $matched"
            exit 1
          }
          [IO.File]::WriteAllLines("$PWD\artifacts\SHA256SUMS.txt", $sums)

          $m = Get-Content artifacts\release-manifest.json -Raw | ConvertFrom-Json
          $updated = 0
          foreach ($a in $m.artifacts) { if ($a.file -eq $name) { $a.sha256 = $hash; $updated++ } }
          if ($updated -ne 1) {
            Write-Error "expected exactly 1 release-manifest.json artifact entry for $name, updated $updated"
            exit 1
          }
          $m.unsigned_build = $false
          [IO.File]::WriteAllText("$PWD\artifacts\release-manifest.json", ($m | ConvertTo-Json -Depth 5))

          gh release upload $env:TAG $env:EXE artifacts\SHA256SUMS.txt artifacts\release-manifest.json --repo ${{ github.repository }} --clobber
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "signed $name  sha256=$hash"
