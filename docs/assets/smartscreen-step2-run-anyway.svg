<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="560" height="360" fill="#0078d7"/>
  <text x="40" y="70" fill="#ffffff" font-size="26" font-weight="600">Windows protected your PC</text>
  <text x="40" y="110" fill="#eaf3fb" font-size="14">Microsoft Defender SmartScreen prevented an unrecognized app from</text>
  <text x="40" y="130" fill="#eaf3fb" font-size="14">starting. Running this app might put your PC at risk.</text>
  <text x="40" y="170" fill="#eaf3fb" font-size="14">App:&#160;&#160;&#160;&#160;&#160;&#160;&#160;TinkerQuarry_1.4.0_x64-setup.exe</text>
  <text x="40" y="192" fill="#eaf3fb" font-size="14">Publisher:&#160;Unknown publisher</text>
  <rect x="176" y="292" width="164" height="36" fill="#e6e6e6" rx="2"/>
  <text x="258" y="315" fill="#1a1a1a" font-size="14" text-anchor="middle" font-weight="600">Run anyway</text>
  <rect x="172" y="288" width="172" height="44" fill="none" stroke="#ffd34d" stroke-width="3" rx="4"/>
  <text x="258" y="278" fill="#ffd34d" font-size="13" font-weight="600" text-anchor="middle">2. then click this</text>
  <rect x="356" y="292" width="164" height="36" fill="#e6e6e6" rx="2"/>
  <text x="438" y="315" fill="#1a1a1a" font-size="14" text-anchor="middle">Don't run</text>
  <text x="40" y="350" fill="#cfe6f7" font-size="11" font-style="italic">Illustration of the Windows SmartScreen dialog (not a screenshot); wording can vary by Windows version.</text>
</svg>
