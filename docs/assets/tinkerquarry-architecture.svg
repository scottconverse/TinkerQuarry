<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">TinkerQuarry system architecture</title>
  <desc id="desc">Desktop UI, Tauri shell, KimCad engine, local tools, model providers, storage, and printer connectors.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="125%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="1280" height="760" rx="30" fill="#e2e8f0"/>
  <rect x="36" y="34" width="1208" height="692" rx="26" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="36" y="34" width="1208" height="86" rx="26" fill="url(#header)"/>
  <text x="72" y="86" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="800" fill="#ffffff">TinkerQuarry Architecture</text>
  <text x="770" y="84" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#dbeafe">local-first desktop app · explicit manufacturing gate · tool subprocess isolation</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(76 166)">
      <rect width="308" height="188" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
      <text x="24" y="38" font-size="22" font-weight="800" fill="#164e63">Studio UI</text>
      <text x="24" y="68" font-size="14" fill="#155e75">React + TypeScript + Monaco + Three.js</text>
      <text x="24" y="104" font-size="14" fill="#0f172a">Prompt composer</text>
      <text x="24" y="128" font-size="14" fill="#0f172a">3D viewer and source editor</text>
      <text x="24" y="152" font-size="14" fill="#0f172a">Customize / Make it real rail</text>
    </g>
    <g transform="translate(76 430)">
      <rect width="308" height="156" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="24" y="38" font-size="22" font-weight="800" fill="#1e3a8a">Desktop Shell</text>
      <text x="24" y="68" font-size="14" fill="#1d4ed8">Tauri 2 + WebView2</text>
      <text x="24" y="104" font-size="14" fill="#0f172a">Starts local engine sidecar</text>
      <text x="24" y="128" font-size="14" fill="#0f172a">Native package and installer smoke-tested</text>
    </g>
    <g transform="translate(486 158)">
      <rect width="336" height="246" rx="18" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <text x="24" y="40" font-size="23" font-weight="800" fill="#0f172a">KimCad Engine</text>
      <text x="24" y="70" font-size="14" fill="#475569">Python 3.13 local HTTP API and CLI</text>
      <rect x="24" y="96" width="288" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="40" y="119" font-size="13" fill="#0f172a">Design plan and template pipeline</text>
      <rect x="24" y="140" width="288" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="40" y="163" font-size="13" fill="#0f172a">Render, validate, orient, slice, send</text>
      <rect x="24" y="184" width="288" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="40" y="207" font-size="13" fill="#0f172a">Session token and source provenance</text>
    </g>
    <g transform="translate(486 472)">
      <rect width="336" height="132" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="24" y="38" font-size="22" font-weight="800" fill="#166534">Local Storage</text>
      <text x="24" y="68" font-size="14" fill="#0f172a">Settings, saved designs, admitted libraries</text>
      <text x="24" y="94" font-size="14" fill="#0f172a">Portable .kimcad import/export</text>
    </g>
    <g transform="translate(914 150)">
      <rect width="286" height="230" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <text x="24" y="38" font-size="22" font-weight="800" fill="#9a3412">Tool Boundary</text>
      <text x="24" y="68" font-size="14" fill="#9a3412">arm's-length subprocess calls</text>
      <text x="24" y="104" font-size="14" fill="#0f172a">OpenSCAD 2026.03.16 Manifold</text>
      <text x="24" y="130" font-size="14" fill="#0f172a">PrintProof3D 0.6.2</text>
      <text x="24" y="156" font-size="14" fill="#0f172a">OrcaSlicer</text>
      <text x="24" y="182" font-size="14" fill="#0f172a">CadQuery optional STEP path</text>
    </g>
    <g transform="translate(914 442)">
      <rect width="286" height="164" rx="18" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
      <text x="24" y="38" font-size="22" font-weight="800" fill="#9d174d">External Edges</text>
      <text x="24" y="70" font-size="14" fill="#0f172a">Local model providers</text>
      <text x="24" y="96" font-size="14" fill="#0f172a">Optional cloud model keys</text>
      <text x="24" y="122" font-size="14" fill="#0f172a">OctoPrint, Moonraker, PrusaLink, Bambu</text>
    </g>
  </g>

  <g stroke="#334155" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M384 260h102"/>
    <path d="M384 508h102"/>
    <path d="M654 404v68"/>
    <path d="M822 278h92"/>
    <path d="M822 278c62 0 62 246 92 246"/>
  </g>
  <g fill="#334155">
    <path d="M486 260l-12-8v16z"/>
    <path d="M486 508l-12-8v16z"/>
    <path d="M654 472l-8-12h16z"/>
    <path d="M914 278l-12-8v16z"/>
    <path d="M914 524l-12-8v16z"/>
  </g>
  <rect x="76" y="644" width="1124" height="46" rx="23" fill="#0f172a"/>
  <text x="638" y="673" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="15" font-weight="700" fill="#ffffff">Default privacy model: local files, local engine, local tools, no account, no telemetry, explicit opt-in for cloud providers.</text>
</svg>
