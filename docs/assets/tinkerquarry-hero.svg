<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="TinkerQuarry — describe it, print it">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d1810"/>
      <stop offset="0.55" stop-color="#16130e"/>
      <stop offset="1" stop-color="#120f0a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0bd84"/>
      <stop offset="1" stop-color="#d98a4a"/>
    </linearGradient>
    <style>
      .wm   { font-family: 'Archivo','Segoe UI',system-ui,sans-serif; font-weight: 800; }
      .sub  { font-family: 'Archivo','Segoe UI',system-ui,sans-serif; font-weight: 600; }
      .mono { font-family: 'JetBrains Mono',ui-monospace,monospace; }
    </style>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <!-- subtle print-layer / quarry-strata motif on the right -->
  <g opacity="0.16" stroke="#9cc47e" stroke-width="2" fill="none">
    <g transform="translate(940,60)">
      <rect x="0" y="0"   width="240" height="34" rx="6"/>
      <rect x="14" y="44"  width="212" height="34" rx="6"/>
      <rect x="30" y="88"  width="180" height="34" rx="6"/>
      <rect x="48" y="132" width="144" height="34" rx="6"/>
      <rect x="68" y="176" width="104" height="34" rx="6"/>
    </g>
  </g>
  <!-- accent rule -->
  <rect x="96" y="92" width="60" height="6" rx="3" fill="url(#amber)"/>

  <!-- wordmark -->
  <text x="92" y="178" class="wm" font-size="92" fill="#e7e0d4">Tinker<tspan fill="url(#amber)">Quarry</tspan></text>
  <!-- tagline -->
  <text x="96" y="226" class="sub" font-size="26" fill="#cdbfa3">Describe a part in plain words. Get a checked, print-ready file.</text>
  <!-- machine line -->
  <text x="96" y="270" class="mono" font-size="17" fill="#9a8f7d">local-first · no cloud · no CAD skills &#8226; <tspan fill="#9cc47e">describe &#8594; design &#8594; gate &#8594; slice &#8594; print</tspan></text>
</svg>
