<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">TinkerQuarry product workflow</title>
  <desc id="desc">Prompt, design, inspect, validate, slice, and send workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <text x="64" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700" fill="#0f172a">From idea to print proof</text>
  <text x="64" y="96" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">Every manufacturing action is gated by source, geometry, printer, material, and slice state.</text>
  <g transform="translate(64 150)" filter="url(#shadow)">
    <g>
      <rect width="178" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#ccfbf1"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#0f766e">1</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Describe</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">Prompt, photo, or sketch</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">stays local by default</text>
    </g>
    <g transform="translate(212 0)">
      <rect width="178" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#dbeafe"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#2563eb">2</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Design</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">KimCad creates source</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">and renders OpenSCAD</text>
    </g>
    <g transform="translate(424 0)">
      <rect width="178" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#fef3c7"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#b45309">3</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Inspect</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">Viewer, code, parameters,</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">orientation, VCL advisory</text>
    </g>
    <g transform="translate(636 0)">
      <rect width="178" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#dcfce7"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#15803d">4</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Validate</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">PrintProof3D checks</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">fit, walls, mesh, score</text>
    </g>
    <g transform="translate(848 0)">
      <rect width="178" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#e0e7ff"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#4f46e5">5</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Slice</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">OrcaSlicer produces</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">printer-ready G-code</text>
    </g>
    <g transform="translate(1060 0)">
      <rect width="156" height="142" rx="16" fill="#ffffff"/>
      <circle cx="34" cy="34" r="16" fill="#fee2e2"/>
      <text x="34" y="40" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700" fill="#b91c1c">6</text>
      <text x="24" y="70" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="700" fill="#0f172a">Send</text>
      <text x="24" y="98" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">Download or explicit</text>
      <text x="24" y="118" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#475569">connector dispatch</text>
    </g>
  </g>
  <path d="M250 221h24m188 0h24m188 0h24m188 0h24m188 0h24" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M274 221l-10-7v14zm212 0l-10-7v14zm212 0l-10-7v14zm212 0l-10-7v14zm212 0l-10-7v14z" fill="#2563eb"/>
  <rect x="64" y="338" width="1152" height="42" rx="21" fill="#0f172a"/>
  <text x="640" y="365" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="15" font-weight="600" fill="#ffffff">Fails closed: stale source, failed gate, or missing slice blocks manufacturing actions.</text>
</svg>
