<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TinkerQuarry — seam check</title>
<style>
  body{margin:0;background:#16130e;color:#efe9df;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;padding:24px;}
  h1{font-size:16px;color:#d98a4a;margin:0 0 4px;}
  .sub{color:#857a69;margin:0 0 18px;}
  .row{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid #241e16;}
  .ok{color:#9cc47e;} .bad{color:#cf6b54;} .k{color:#bdb29f;min-width:230px;}
  .v{color:#e7e0d4;}
  #verdict{margin-top:18px;font-size:15px;font-weight:700;padding:12px 16px;border-radius:9px;}
  pre{background:#100d09;border:1px solid #271f15;border-radius:8px;padding:12px;overflow:auto;color:#cabfac;}
</style>
</head>
<body>
<h1>TinkerQuarry — frontend ↔ backend seam check</h1>
<p class="sub">Browser → api-client.js → KimCad API (mock on :8766). Proves the glue end-to-end, offline.</p>
<div id="rows"></div>
<div id="verdict">running…</div>
<details><summary style="cursor:pointer;color:#857a69;margin-top:14px;">raw design response</summary><pre id="raw"></pre></details>

<script src="./api-client.js"></script>
<script>
const rows = document.getElementById('rows');
function row(k, ok, v){
  const d = document.createElement('div'); d.className='row';
  d.innerHTML = `<span class="${ok?'ok':'bad'}">${ok?'✓':'✗'}</span><span class="k">${k}</span><span class="v">${v}</span>`;
  rows.appendChild(d); console.log((ok?'OK ':'FAIL ')+k+' : '+v);
  return ok;
}
(async () => {
  const api = new TinkerQuarryAPI('http://127.0.0.1:8766');
  let allOk = true;
  try {
    const h = await api.health();
    allOk &= row('GET /api/health (mock header present)', h.mock===true && h.data.openscad===true, JSON.stringify(h.data));
    const m = await api.modelStatus();
    allOk &= row('GET /api/model-status (local-first)', m.data.backend==='local' && m.data.vision_present===true, `${m.data.model} · vision:${m.data.vision_present}`);
    const d = await api.design('a wall bracket for a Raspberry Pi 4 — M3 screws, 3 mm walls');
    document.getElementById('raw').textContent = JSON.stringify(d.data, null, 2);
    const rid = d.data.rid;
    allOk &= row('POST /api/design → completed + gate pass', d.data.status==='completed' && d.data.report.gate_status==='pass', `rid ${rid} · readiness ${d.data.report.readiness.score}`);
    allOk &= row('visual-correction loop result surfaced', d.data.report.vcp.ran===true && d.data.report.vcp.approved===true, `mode ${d.data.report.vcp.mode} · caught ${d.data.report.vcp.issues_caught.length}`);
    const sl = await api.slice(rid, 'bambu_p1s', 'pla');
    allOk &= row('POST /api/slice → sliced', sl.data.sliced===true, `${sl.data.machine} · ${sl.data.estimate}`);
    const sn = await api.send(rid, true, 'mock');
    allOk &= row('POST /api/send (mock) → simulated, not real', sn.data.sent===true && sn.data.simulated===true, `job ${sn.data.job.job_id} · simulated ${sn.data.simulated}`);
  } catch(e){
    allOk = false; row('exception', false, String(e));
  }
  const v = document.getElementById('verdict');
  v.textContent = allOk ? 'SEAM OK — browser reached the backend through api-client.js and got real, correctly-shaped responses.' : 'SEAM FAILED — see rows above.';
  v.style.background = allOk ? '#1d2a1a' : '#2a1714';
  v.style.color = allOk ? '#aed18e' : '#e69b88';
  v.style.border = '1px solid ' + (allOk ? '#324a2c' : '#5a2c24');
  window.__seamOk = allOk;
})();
</script>
</body>
</html>
