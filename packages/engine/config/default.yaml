# KimCad default configuration.
# Copy to config/local.yaml (gitignored) to override on a given machine.
# VERIFY markers: re-check per spec §7.5 before relying on the value.

binaries:
  # Paths are relative to the project root unless absolute.
  # Populated by the tools/ fetch step; override here for a system install.
  # KC-8 (#13): these defaults are the Windows-bundled .exe paths. On macOS/Linux the
  # auto-fetch step can't provision these yet — install OpenSCAD/OrcaSlicer yourself and set
  # absolute paths in config/local.yaml, e.g.:
  #   macOS:  openscad: /Applications/OpenSCAD.app/Contents/MacOS/OpenSCAD
  #           orcaslicer: /Applications/OrcaSlicer.app/Contents/MacOS/OrcaSlicer
  #   Linux:  openscad: /usr/bin/openscad      (or the OpenSCAD .AppImage)
  #           orcaslicer: /usr/bin/orca-slicer  (or the OrcaSlicer .AppImage)
  # The browser UI (`kimcad web`) runs without either; only rendering and slicing need them.
  openscad: tools/openscad/openscad.exe
  orcaslicer: tools/orcaslicer/orca-slicer.exe
  # Stage 7 validation engine (PrintProof3D v0.6.2, MIT Rust binary, invoked at arm's length).
  # Windows installer builds fetch and stage the checksum-pinned binary here; source checkouts may
  # leave it absent, in which case KimCad resolves it to "not present" and Smart Mesh falls back to
  # its own gate at lower confidence. Set an absolute path in config/local.yaml to override.
  # See docs/printproof3d-integration.md.
  printproof3d: tools/printproof3d/printproof3d.exe
  # Stage 8 CadQuery backend interpreter. KimCad targets Python 3.13 and CadQuery runs on
  # 3.13 too — but generated CadQuery code still executes OUT-OF-PROCESS in its own
  # interpreter (a security-isolation choice, not a version constraint). Point this at a
  # Python that has `cadquery` installed (pip install cadquery). Values:
  #   null (default) -> auto-discover (the repo-local .venv-cq313 first, then
  #                     `py -3.13/-3.12/-3.11`, then python3.13/.. on PATH)
  #   false or ""    -> force the CadQuery backend OFF even if an interpreter exists
  #   "<path>"       -> use this exact python.exe (must have cadquery), no auto-discovery
  # When no interpreter is found the CadQuery backend simply stays off (OpenSCAD still works).
  cadquery_python: null

# Optional per-user paths (Stage 7). Sensible defaults; uncomment to relocate.
# paths:
#   # The Smart Mesh learning store (local-first; nothing leaves the machine). Unset (the default)
#   # => ~/.kimcad/history.json — per-user, outside the repo so it's never committed. Set an
#   # ABSOLUTE path to relocate it; a relative path resolves against the project root (no ~ expansion).
#   history: C:\Users\you\.kimcad\history.json

llm:
  # Active backend: one of the keys under `backends`.
  # Local-first: no cloud calls. Cloud backends remain defined for later opt-in.
  active: local
  # Optional fallback backend key. When set, a primary connection/timeout/model-not-found
  # error transparently retries against this backend instead of failing immediately.
  # Example: set to cloud_deepseek in local.yaml to fall back to cloud when Ollama is down.
  alt_backend: null

  backends:
    cloud_deepseek:
      provider: deepseek
      base_url: https://api.deepseek.com/v1
      model_name: deepseek-v4-flash   # VERIFY §7.1 — exact tag + pricing move weekly
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

    local:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # Ollama default; LM Studio uses :1234
      model_name: qwen3.5:9b                # the on-device PLANNER, flipped 2026-07-15 per the
                                            # published-record research verdict -- NOT the v1.5-6
                                            # bake-off's own winner (Mellum2). The bake-off's grader
                                            # was later proven feature-blind (Mellum2 b02: 8 holes
                                            # where 4 were asked, 60mm legs declared inside a 40mm
                                            # bbox, still scored "completed"); a fidelity re-grade
                                            # tied Mellum2 to the incumbent, and JetBrains' own
                                            # technical report corroborated the miss (BS-Bench
                                            # false-premise detection 14-24 vs Qwen3.5's 56-70, with
                                            # the authors' own admission their SFT/RL signal "leans
                                            # toward compliance" -- the wrong trait for a planner
                                            # that must reject contradictory dimensions). Deep
                                            # research across the published record then ranked
                                            # Qwen3.5-9B first for this task profile: IFEval 83.9,
                                            # BFCL v3 70.5, StructEval (peer-reviewed) 90.96 vs the
                                            # incumbent's 84.40. Full history:
                                            # docs/benchmarks/stage-v156-model-bakeoff.md.
                                            # ~6.6 GB disk / ~7-8 GB RAM working set (measured on
                                            # this box) -- SMALLER than Mellum2's ~8.1 GB / ~9-10 GB;
                                            # the advisor floor was lowered to match (see
                                            # model_advisor.py). Prior default qwen2.5:7b stays
                                            # selectable via `local_qwen2_5` below. Override in
                                            # local.yaml per machine.
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false     # Ollama: rely on JSON-instructed prompt
      vision_model: qwen2.5vl:3b            # Stage 9: the DEDICATED local vision model for the
                                            # photo/sketch on-ramps (ollama pull qwen2.5vl:3b).
                                            # Measured on-target: gemma4:e4b's vision is broken
                                            # on this stack (reports "no image provided"), while
                                            # qwen2.5vl:3b reads dimensioned sketches 3/3 — see
                                            # docs/benchmarks/stage-9-vision-onramps.md. The image
                                            # never leaves the machine either way. (Unaffected by
                                            # the v1.5-6 chat-model flip -- vision wasn't in scope.)

    local_qwen2_5:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # same Ollama; the prior (pre-v1.5-6) default
      model_name: qwen2.5:7b                # the default 2026-06-15 - 2026-07-15: on-machine
                                            # bake-off (16-thread CPU / 780M iGPU) planned 4/4 vs
                                            # gemma4:e4b 1/4 and llama3.1:8b 0/4. Superseded as the
                                            # DEFAULT by qwen3.5:9b (`local`, above) per the
                                            # 2026-07-15 research verdict -- kept selectable
                                            # (`--backend local_qwen2_5`) as a smaller-footprint
                                            # alternative (~4.7 GB / ~6 GB RAM vs qwen3.5:9b's
                                            # ~6.6 GB / ~7-8 GB RAM).
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    local_qwen:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # same Ollama; the Stage 6 bake-off challenger
      model_name: qwen2.5-coder:1.5b        # Stage 6 candidate — evaluated via the live bake-off
                                            # 2026-06-02 and REJECTED (0/10: a code model can't
                                            # produce a design plan). Retained as a selectable
                                            # `--backend` to re-run the comparison (`kimcad bakeoff`).
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    # v1.5-6 bake-off candidates (2026-07-15). All Apache-2.0/MIT, pulled locally;
    # selectable via `kimcad bakeoff --backends ...`. Slate rationale + rejected
    # candidates (RAM/runtime/no-runtime): docs/benchmarks/stage-v156-model-bakeoff.md.
    #
    # VERDICT: SUPERSEDED -- the shipped default is qwen3.5:9b (`local`, above), NOT cand_mellum2.
    # cand_mellum2 won the 10-case bake-off outright on this harness's original scoring (completed
    # 10/10, graded 6/10, matched 10/10, sliced 10/10, mean 39.9s vs qwen2.5:7b's 9/10, 3/10, 8/10,
    # 9/10, 61.2s) -- but an independent review then proved the grader feature-blind (Mellum2 b02:
    # 8 holes where 4 were asked, 60mm legs declared inside a 40mm bbox, still scored "completed"),
    # and a fidelity re-grade tied Mellum2 to the incumbent on feature-fidelity axes. JetBrains' own
    # technical report corroborated the miss (BS-Bench false-premise detection 14-24 vs Qwen3.5's
    # 56-70). Follow-up deep research on the published record ranked Qwen3.5-9B first for this task
    # profile; the owner chose to switch on that record (2026-07-15). Full history:
    # docs/benchmarks/stage-v156-model-bakeoff.md. cand_gemma26 produced empty output on this
    # Ollama 0.32.0 runtime (0/10 -- a runtime-compat asterisk, not a quality verdict; see the
    # report). cand_seedcoder completed 7/10 (graded 4/10, 135.1s -- 2.2x slower). cand_gemma12
    # completed 2/10 (graded 2/10, 238.4s, mostly plan_failed). This block stays as the historical
    # run record + a re-runnable slate (`kimcad bakeoff --backends cand_mellum2,
    # cand_gemma26,cand_seedcoder,cand_gemma12,local_qwen2_5`); nothing here needs to change to
    # re-run the comparison later.
    cand_mellum2:
      provider: openai_compatible
      base_url: http://localhost:11434/v1
      model_name: JetBrains/mellum2-instruct-q4_k_m   # MoE 12B/2.5B-active, Apache-2.0
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    cand_gemma26:
      provider: openai_compatible
      base_url: http://localhost:11434/v1
      model_name: gemma4:26b-a4b-it-q4_K_M            # MoE 26B/4B-active, Apache-2.0
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    cand_seedcoder:
      provider: openai_compatible
      base_url: http://localhost:11434/v1
      model_name: hf.co/unsloth/Seed-Coder-8B-Instruct-GGUF:Q4_K_M  # dense 8B, MIT
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    cand_gemma12:
      provider: openai_compatible
      base_url: http://localhost:11434/v1
      model_name: gemma4:12b-it-q4_K_M                # dense 12B, Apache-2.0
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    custom_openrouter:
      provider: openai_compatible
      base_url: https://openrouter.ai/api/v1
      model_name: ""                         # user supplies
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

defaults:
  printer: bambu_p2s
  material: pla
  output_format: "3mf"   # falls back to "stl" if OpenSCAD lacks lib3mf
  # OpenSCAD 2026.x uses the modern Manifold backend by default. Keep this explicit so a
  # beta gate can flip to CGAL if corpus re-rendering shows too many stricter-manifold regressions.
  # Supported: "Manifold" (default) or "CGAL".
  openscad_backend: "Manifold"

# Build volume = [x, y, z] in mm. nozzle_diameter in mm.
# OrcaSlicer profile names below are verified against the pinned shipped build
# (v2.4.0-alpha resources/profiles/) — each per-material filament profile is checked to
# resolve, be compatible with the machine, and live-slice. orca_filament_profiles is the
# SOLE source of truth per printer: a material with no entry is honestly "not available" on
# that printer (no cross-vendor generic fallback, which could mis-slice on the wrong machine).
# The app may still mark a profile not sliceable when the bundled OrcaSlicer is known to reject
# that upstream profile at runtime.
printers:
  bambu_p2s:
    name: "Bambu Lab P2S"
    build_volume: [256, 256, 256]   # VERIFIED == the shipped Orca machine profile's printable
                                    # area (test_configured_build_volumes_match_the_shipped_orca_profiles)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab P2S 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL P2S"
    # Per-material filament profiles, each verified to live-slice on this machine.
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL P2S"
      petg: "Generic PETG @BBL P2S"
      tpu: "Bambu TPU 95A @BBL P2S"
      abs: "Bambu ABS @BBL P2S"
    reference_hardware: true          # target hardware (validated in the final beta, not yet)
  bambu_a1:
    name: "Bambu Lab A1"
    build_volume: [256, 256, 256]   # VERIFIED == the shipped Orca machine profile's printable
                                    # area (same pin test as the P2S)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab A1 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL A1"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL A1"
      petg: "Bambu PETG Basic @BBL A1"
      tpu: "Bambu TPU 95A @BBL A1"
      abs: "Bambu ABS @BBL A1"
    reference_hardware: true          # Kim's; validated in the final beta, not yet
  elegoo_neptune_4_max:
    name: "Elegoo Neptune 4 Max"
    build_volume: [420, 420, 480]   # == shipped Orca profile printable area (OrcaSlicer 2.4.0)
    nozzle_diameter: 0.4
    orca_machine_profile: "Elegoo Neptune 4 Max (0.4 nozzle)"
    orca_process_profile: "0.20mm Standard @Elegoo Neptune4Max (0.4 nozzle)"
    orca_filament_profiles:
      pla: "Generic PLA @Elegoo"
      petg: "Generic PETG @Elegoo"
      abs: "Generic ABS @Elegoo"
      # No TPU entry: the shipped OrcaSlicer has no TPU filament profile compatible with the
      # Neptune 4 Max, so TPU is honestly NOT offered for this printer rather than silently
      # mapped to an incompatible (Bambu) generic. (Verified: no Elegoo TPU profile ships.)
    reference_hardware: true          # target hardware (validated in the final beta, not yet)

  # ---- #22 curated catalog: popular current machines across the top makers. Each is
  # build-volume-verified against its shipped OrcaSlicer machine profile (KC-7,
  # test_configured_build_volumes_match_the_shipped_orca_profiles) and slice-proven — a 20 mm box
  # was run through the REAL OrcaSlicer with the machine+process+filament profiles below, per
  # scripts/build_printer_catalog.py --verify (re-run it to refresh from a newer profile tree).
  # These are NOT reference_hardware (no native direct-send, not Kim's target box), so they take
  # the default reference_hardware:false. A material absent from a printer's list has NO shipped
  # filament profile that slices on it (honest "not available" — e.g. the A1 mini offers no ABS,
  # the Elegoo Neptune family no TPU), never a silent cross-vendor fallback. Some entries use a
  # vendor's shared family profile (e.g. Bambu P1S/X1E slice with @BBL X1C, Sovol SV06 with a
  # shared filament) — that's the vendor's own shipped profile, verified to slice here. ----
  bambu_p1p:
    name: "Bambu Lab P1P"
    build_volume: [256, 256, 250]
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab P1P 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL P1P"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL P1P"
      petg: "Bambu PETG Basic @BBL X1C"
      tpu: "Bambu TPU 95A @BBL P1P"
      abs: "Bambu ABS @BBL P1P"
