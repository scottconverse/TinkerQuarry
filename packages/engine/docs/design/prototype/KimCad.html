<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KimCad</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400..800&family=Hanken+Grotesk:wght@300..800&family=Space+Grotesk:wght@400..700&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg,#f3efe6);
    color:var(--ink,#26231c);
    font-family:var(--font-body,"Hanken Grotesk",system-ui,sans-serif);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  #root{height:100vh;width:100vw;}
  ::selection{background:color-mix(in srgb,var(--accent,#c8623a) 24%,transparent);}
  /* scrollbars */
  .kc-scroll{scrollbar-width:thin;scrollbar-color:color-mix(in srgb,var(--ink) 18%,transparent) transparent;}
  .kc-scroll::-webkit-scrollbar{width:9px;height:9px;}
  .kc-scroll::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--ink) 16%,transparent);border-radius:6px;border:2px solid transparent;background-clip:content-box;}
  .kc-scroll::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--ink) 28%,transparent);background-clip:content-box;}
  @keyframes kc-spin{to{transform:rotate(360deg);}}
  @keyframes kc-fadeup{from{transform:translateY(10px);}to{transform:translateY(0);}}
  @keyframes kc-pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
  @keyframes kc-blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>

<script type="text/babel" src="jsx/tweaks-panel.jsx"></script>
<script type="text/babel" src="jsx/styles.jsx"></script>
<script type="text/babel" src="jsx/data.jsx"></script>
<script type="text/babel" src="jsx/preview.jsx"></script>
<script type="text/babel" src="jsx/panels.jsx"></script>
<script type="text/babel" src="jsx/advanced.jsx"></script>
<script type="text/babel" src="jsx/wizard.jsx"></script>
<script type="text/babel" src="jsx/app.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<KimCadApp />);
</script>
</body>
</html>
