# Seed OpenSCAD module library manifest (spec §8).
# This is injected into the codegen system prompt so the model composes from proven
# modules via `use <library/NAME.scad>;` rather than reinventing geometry.

modules:
  - file: box.scad
    summary: >-
      HOLLOW walled container (outer shell with floor + side walls, optional open
      top) — NOT a solid cube. For a solid cube use the built-in cube(). Has no
      'center' parameter.
    signatures:
      - "box(width, depth, height, wall=2.0, floor=2.0, open_top=true)"

  - file: bracket.scad
    summary: L bracket (two 90° arms) with mounting holes through both arms.
    signatures:
      - "l_bracket(arm=40, width=30, thick=4, screw=4, inset=8)"

  - file: fasteners.scad
    summary: Metric screw/nut/heat-set helpers (M2–M8). Cut tools for difference().
    signatures:
      - "screw_clearance_hole(size=3, depth=10, fn=32)"
      - "counterbore(size=3, head_d=6.0, head_h=3.0, depth=12, fn=32)"
      - "nut_trap(size=3, depth=3, fn=6)"
      - "heatset_hole(size=3, depth=6, fn=32)"

  - file: fillets.scad
    summary: Cheap rounding (2D hull/offset, never minkowski).
    signatures:
      - "rounded_rect(width, depth, r=3, fn=32)"
      - "rounded_box(width, depth, height, r=3, fn=32)"
      - "rounded_plate(width, depth, height, r=3, fn=32)"

  - file: mounts.scad
    summary: Hole-grid and VESA mounting patterns (cut tools).
    signatures:
      - "hole_grid(cols=2, rows=2, dx=20, dy=20, size=4, depth=12, fn=32)"
      - "vesa(pattern=100, size=4, depth=12, fn=32)"

  - file: hooks.scad
    summary: >-
      Wall and pegboard hooks: a back plate (wall at the -Y face) with a hook that
      projects out +Y. Use these for any "hook" rather than building plates and arms
      by hand. Each prints flat with no supports.
    signatures:
      - "wall_hook(plate_w=25, plate_h=60, plate_t=4, screw_d=4, screw_spacing=30, arm_proj=35, arm_rise=20)  // bbox = [plate_w, plate_t+arm_proj, plate_h]"
      - "pegboard_hook(hole_d=6, hole_spacing=25.4, arm_length=45, plate_w=30, plate_t=5, peg_len=12)  // bbox = [plate_w, peg_len+plate_t+arm_length, hole_spacing+2*6+16]"

  - file: clips.scad
    summary: Screw-down cable/cord saddle clip (cable runs along X). Prints flat.
    signatures:
      - "cable_clip(cable_d=6, width=20, screw_d=4, wall=3)  // bbox = [width, cable_d+5*wall+screw_d, cable_d/2+2*wall]"

  - file: containers.scad
    summary: >-
      Closed boxes, two-part enclosures (sized from INTERNAL volume), and tubes/spacers.
      snap_box is sized to its OUTER envelope; enclosure adds walls around the interior.
    signatures:
      - "snap_box(width=80, depth=60, height=40, wall=2)  // bbox = [width, depth, height]"
      - "enclosure(inner_w=80, inner_d=50, inner_h=30, wall=2.5)  // bbox = inner + 2*wall each axis"
      - "tube(id=8, od=16, height=12)  // ring / spacer; bbox = [od, od, height]"

  - file: holders.scad
    summary: >-
      Wall-mounted spool holder: a screwed-on back plate with a horizontal arm the
      spool slides onto, plus an end stop. Sized from the spool's width and diameter.
    signatures:
      - "spool_holder(spool_od=200, spool_width=70, screw_d=4, plate_w=60, plate_t=8, plate_h=120)  // bbox = [plate_w, plate_t+spool_width+15, plate_h]"

  - file: organizers.scad
    summary: Drawer divider — a frame split into equal compartments by cross walls.
    signatures:
      - "drawer_divider(length=150, depth=80, height=50, panel_t=2, compartments=3)  // bbox = [length, depth, height]"

  - file: frames.scad
    summary: >-
      Picture / art frames and framing boards: rectangular frames with a back glass rabbet,
      flat mats, floating frames, deep shadow boxes, and backlit lithophane frames. Each is
      built corner-at-origin so the bbox is the exact envelope.
    signatures:
      - "picture_frame(opening_w=90, opening_h=130, border=12, rabbet=4, depth=10, lip=3)  // bbox = [opening_w+2*border, opening_h+2*border, depth]"
      - "mat_board(mat_w=130, mat_h=160, window_w=90, window_h=120, mat_t=2)  // bbox = [mat_w, mat_h, mat_t]"
      - "floating_frame(opening_w=90, opening_h=90, lip_w=10, gap=5, depth=20, back_t=3)  // bbox = [opening_w+2*gap+2*lip_w, opening_h+2*gap+2*lip_w, depth]"
      - "shadow_box_frame(opening_w=80, opening_h=80, border=12, cavity_depth=25, rabbet=4, back_t=3, lip=3)  // bbox = [opening_w+2*border, opening_h+2*border, cavity_depth+rabbet+back_t]"
      - "lithophane_frame(outer_w=100, outer_h=120, face_rim=8, light_gap=12, panel_t=3, face_rim_t=2)  // bbox = [outer_w, outer_h, face_rim_t+panel_t+light_gap]"

  - file: hangers.scad
    summary: >-
      Picture/art hanging hardware: a flat back plate (wall at the -Y face) with teeth, a
      keyhole slot, or horizontal shelf rods. Each prints flat with no supports.
    signatures:
      - "sawtooth_hanger(plate_w=40, plate_h=15, plate_t=3, tooth_count=5, tooth_depth=4)  // bbox = [plate_w, plate_t, plate_h+tooth_depth]"
      - "keyhole_hanger_plate(plate_w=30, plate_h=50, plate_t=4, hole_d=10, slot_w=5)  // bbox = [plate_w, plate_t, plate_h]"
      - "hidden_rod_shelf_bracket(plate_w=80, plate_h=40, plate_t=6, rod_length=40, rod_d=8)  // bbox = [plate_w, plate_t+rod_length, plate_h]"

  - file: dishes.scad
    summary: >-
      Zen / desktop trays, dishes, and incense holders: ring/trinket dishes, incense cone &
      stick holders, rounded catch-all & handled serving trays, draining soap dishes, and a
      zen sand garden tray on feet. Corner-at-origin; cylinders XY-centered; prints flat.
    signatures:
      - "ring_dish(od=70, h=18, wall=3, well_depth=12, spike_h=0)  // ring/trinket dish; optional center spike; bbox = [od, od, h+spike_h]"
      - "incense_cone_holder(dish_d=70, h=18, ped_d=28, moat_depth=8, dimple_d=12)  // bbox = [dish_d, dish_d, h]"
      - "incense_stick_holder(length=120, width=40, h=12, hole_d=4, trough_depth=6)  // bbox = [length, width, h]"
      - "catchall_tray(length=120, width=90, h=25, wall=3, corner_r=8, floor=2)  // rounded valet/EDC tray; bbox = [length, width, h]"
      - "soap_dish(length=110, width=80, h=22, wall=3, rib_count=4)  // draining; bbox = [length, width, h]"
      - "handled_tray(length=160, width=120, h=40, wall=3, handle_w=70)  // grips in end walls; bbox = [length, width, h]"
      - "zen_garden_tray(length=120, width=90, wall_h=18, wall=3, foot_h=6)  // sand tray on feet; bbox = [length, width, wall_h+foot_h]"
      - "tealight_holder(od=50, h=20, pocket_d=39.5, pocket_h=12, wall=3)  // top pocket seats a ~38-40 mm tealight cup; bbox = [od, od, h]"
      - "taper_candle_holder(base_d=70, h=40, bore_d=22, bore_depth=25)  // solid base + centered taper socket; bbox = [base_d, base_d, h]"
      - "luminary_base(outer_d=80, height=40, cavity_d=52, cavity_h=26, rim_ledge=5, ledge_t=3)  // bbox = [outer_d, outer_d, height]"
      - "bud_vase_sleeve(od=60, h=120, bore_d=26, bore_depth=110, wall=4)  // seats a glass test tube; bbox = [od, od, h]"
      - "pencil_cup(od=70, h=100, wall=3, floor_t=4)  // straight-walled pen/pencil/brush cup; bbox = [od, od, h]"
      - "propagation_station(length=160, depth=40, h=20, tube_d=24, leg_h=70)  // bar on legs + fixed tube bores; bbox = [length, depth, h+leg_h]"
      - "planter_pot(bottom_d=70, top_d=90, h=90, wall=3, drain_d=12)  // tapered pot + drain; bbox = [top_d, top_d, h] (top_d>=bottom_d)"
      - "planter_saucer(od=140, h=22, wall=4, floor_t=3, rim_h=6, rim_w=4)  // drip tray + pot-rest rim; bbox = [od, od, h]"
      - "bonsai_pot(length=140, width=100, h=35, wall=4, drain_d=8)  // rectangular tray-pot + 2x2 drain holes; bbox = [length, width, h]"
      - "succulent_pot(od=80, h=75, wall=3, facets=8, drain_d=12)  // faceted n-gon pot + drain; bbox = [od, od, h]"
      - "coaster_with_rim(od=90, h=6, rim_w=4, rim_h=3, floor_t=2)  // round coaster w/ raised rim; bbox = [od, od, h]"
      - "hotplate_trivet(size=140, plate_t=6, slot_w=10, foot_h=8)  // square slotted hot-pad on feet; bbox = [size, size, plate_t+foot_h]"
      - "l_bookend(height=150, width=120, base_len=110, upright_t=6, base_t=5)  // L-shaped bookend; bbox = [base_len, width, height]"
      - "geometric_wall_tile(side=100, base_t=3, border_w=6, border_h=4)  // modular bordered wall tile; bbox = [side, side, base_t+border_h]"
      - "tile_connector_clip(length=60, width=24, neck_w=12, thick=4, tongue_l=14)  // flat dogbone tile clip; bbox = [length, width, thick]"
      - "medallion_blank(diameter=60, thick=4, hole_d=4, rim_margin=5)  // flat round ornament/medallion blank + hang hole; bbox = [diameter, diameter, thick]"
      - "ornament_cap(cap_d=22, cap_h=12, neck_d=14, loop_od=14, loop_t=4)  // press-fit sphere ornament cap + hang loop; bbox = [cap_d, cap_d, cap_h+loop_od]"
      - "gift_box_lid(width=90, depth=70, base_h=35, lid_h=40, wall=2, gap=8)  // telescoping two-part gift box; bbox = [2*width+gap, depth, lid_h] (lid_h>=base_h)"
      - "jar_lid(outer_d=70, top_t=4, skirt_d=64, skirt_h=12, skirt_wall=3)  // press/recess jar lid + down-skirt; bbox = [outer_d, outer_d, top_t+skirt_h] (skirt_d<=outer_d)"
      - "wedge_easel_stand(width=80, back_height=70, base_depth=60, lip_height=14, lip_depth=10)  // fixed-angle tabletop easel + front lip; bbox = [width, base_depth, back_height+lip_height]"
      - "display_riser(base_w=90, base_d=70, tiers=4, step_in=8, tier_t=8)  // tiered stepped pedestal; bbox = [base_w, base_d, tiers*tier_t]"
      - "slanted_card_easel(base_w=90, base_depth=40, base_height=45, slot_w=4, back_margin=12, lean_deg=15)  // base block + interior angled card slot; bbox = [base_w, base_depth+back_margin, base_height]"
      - "desk_nameplate_strip_stand(base_w=120, base_depth=45, base_height=14, slot_w=4, slot_back_offset=30)  // desk base + rear leaning wedge + strip slot; bbox = [base_w, base_depth, base_height+slot_back_offset]"
      - "place_card_holder(base_w=60, base_depth=25, base_height=18, slit_w=2.5, slit_depth=12, end_margin=6)  // base + thin vertical card slot; bbox = [base_w, base_depth, base_height]"
      - "picture_ledge_shelf(length=160, depth=70, back_height=40, lip_height=15, thk=4, screw_d=4)  // wall ledge + front lip + screw holes; bbox = [length, depth, back_height] (lip_height<=back_height)"
      - "peg_hook_rail(length=160, bar_h=40, bar_t=12, peg_length=35, peg_d=12, peg_count=5)  // wall back-bar + fixed row of pegs; bbox = [length, bar_t+peg_length, bar_h]"
      - "j_decor_hook(width=60, back_height=70, reach=22, catch_rise=18, thk=5, screw_d=4)  // extruded J robe/towel hook + screw tab; bbox = [width, thk+reach, back_height+catch_rise]"
      - "plate_display_stand(base_w=90, base_depth=70, back_height=90, groove_w=8, base_h=10, lean_off=24)  // upright plate stand + leaning groove; bbox = [base_w, base_depth+lean_off, base_h+back_height]"
      - "canvas_stretcher_corner(arm=80, leg_w=18, bar_t=10, tongue_l=40, tongue_h=8)  // L corner key squares two canvas stretcher bars + underside tongues; bbox = [arm, arm, bar_t+tongue_h]"
      - "frame_corner_clamp(jaw_l=50, jaw_t=12, jaw_h=20, screw_d=5, corner=20)  // right-angle frame glue jig: corner block + two perpendicular jaws; bbox = [jaw_l+corner, jaw_l+corner, jaw_h]"
      - "frame_corner_joiner(plate=50, plate_t=4, screw_d=4, screw_inset=10, rib_h=2, rib_w=4)  // under-side miter spline plate + registration rib; bbox = [plate, plate, plate_t+rib_h]"
      - "frame_turn_button(button_l=40, button_w=16, button_t=4, bore_d=4, boss_h=3, boss_d=12, corner_r=4)  // rotating backing-board retainer + pivot boss; bbox = [button_l, button_w, button_t+boss_h]"
      - "frame_backing_clip(clip_l=30, clip_w=16, clip_t=3, step=6, tab=10)  // flat stepped offset clip wedges a backing board into the rabbet; bbox = [clip_l, clip_w, clip_t+step]"
      - "wire_loop_hanger(base_w=30, base_t=4, base_h=18, loop_height=22, loop_thk=4, screw_d=4)  // screw-on plate + upstanding triangular wire bail; bbox = [base_w, base_t, base_h+loop_height]"
      - "z_clip_panel_hanger(length=120, flange_w=20, web_h=15, thk=4, screw_d=4)  // wall half of a Z-profile interlocking panel clip; bbox = [length, flange_w+thk, web_h+2*thk]"
      - "art_french_cleat_pair(length=120, depth=22, rise=18, thick=6, gap=10)  // matched pair of 45-degree interlocking wall cleats printed side by side; bbox = [length, 2*depth+gap, rise]"
      - "picture_rail_hook(width=50, throat_depth=18, throat_gap=22, body_height=60, thk=5, eye_d=8)  // over-the-molding inverted-J rail hook + cord eye; bbox = [width, throat_depth+thk, body_height+throat_gap]"
      - "d_ring_strap_hanger(strap_w=40, strap_t=5, strap_h=50, ring_od=28, ring_thk=6, screw_d=4)  // screw-down strap plate + fixed printed D-ring loop; bbox = [strap_w, strap_t+ring_thk, strap_h+ring_od]"

  - file: parts.scad
    summary: >-
      Generic engineering ports — rings, plates, and brackets: flat washers/shims, dowel pins,
      counterbored bumper feet, bolt-circle mounting flanges, drilled mount pads & faceplates,
      VESA adapter plates, triangular corner gussets, PCB standoff bases, French cleat wall
      rails, and heat-set insert bosses. Corner-at-origin; cylinders XY-centered; prints flat.
    signatures:
      - "flat_washer(od=16, id=8, thickness=2)  // disc od x thickness with a concentric id through bore; bbox = [od, od, thickness]"
      - "dowel_pin(diameter=6, length=30)  // solid alignment cylinder; bbox = [diameter, diameter, length]"
      - "bumper_foot(diameter=30, height=12, hole_d=4.5, counterbore_d=9, cbore_h=5)  // short foot + bottom counterbored screw hole; bbox = [diameter, diameter, height]"
      - "mounting_flange(diameter=80, thickness=8, bore_d=20, bolt_hole_d=5, bolt_circle_d=32)  // round flange disc + centered bore + 4 bolt holes on a fixed bolt-circle; bbox = [diameter, diameter, thickness]"
      - "pierced_mount_pad(width=60, depth=40, height=6, hole_d=8)  // rectangular pad + single centered vertical through-hole; bbox = [width, depth, height]"
      - "faceplate(width=80, height=60, thickness=3, hole_d=4, inset=6)  // blanking/cover plate + four corner screw holes; bbox = [width, height, thickness]"
      - "vesa_plate(width=140, height=140, thickness=4, vesa_spacing=100, hole_d=4.5)  // monitor-mount adapter slab + centered square 4-hole VESA pattern; bbox = [width, height, thickness]"
      - "corner_gusset(width=50, leg=40, thickness=6, hole_d=4)  // triangular corner brace web + a screw hole through each leg; bbox = [width, leg, leg]"
      - "pcb_standoff(board_w=70, board_d=50, base_t=3, standoff_h=8, hole_d=3.2, standoff_d=8, inset=5)  // base plate + four inset corner standoffs with through screw holes; bbox = [board_w, board_d, base_t+standoff_h]"
      - "french_cleat_rail(length=170, depth=22, rise=30, screw_d=4)  // wall half of a 45-degree French cleat + screw holes; bbox = [length, depth, rise]"
      - "heatset_insert_boss(boss_d=12, height=14, pocket_d=5, pocket_depth=8)  // cylindrical boss + blind top pocket for a brass heat-set insert; bbox = [boss_d, boss_d, height]"
      - "snap_fit_box(width=80, depth=60, height=40, wall=2, lid_h=12, gap=10)  // two-part friction box: open-top base + drop-over lid printed side by side; bbox = [2*width + gap, depth, height]"
      - "hinged_lid_box(width=80, depth=60, height=40, wall=2, gap=10)  // tackle box: open-top base + press-on lid with a downward inner lip, printed side by side; bbox = [2*width + gap, depth, height]"
      - "slot_clamp_block(width=40, depth=30, height=35, slot_w=4, screw_d=5)  // slotted clamp block: top slot grips a rod/panel, cross screw through the jaws; bbox = [width, depth, height]"
      - "cable_raceway(length=160, width=30, height=20, wall=3)  // open-top U-channel cable router + a row of floor mounting holes; bbox = [length, width, height]"
      - "bar_pull_handle(span=128, height=32, depth=30, post_d=14, grip_d=12)  // bar/drawer pull: two posts carry a grip rail, screw hole through each post base; bbox = [span, depth, height]"
      - "phone_dock(width=80, depth=70, height=90, slot_w=12, cable_d=10)  // weighted phone/tablet dock + angled rest slot + front cable pass-through; bbox = [width, depth, height]"
      - "pour_funnel(inlet_d=90, height=80, outlet_d=20, wall=3)  // hollow truncated-cone pour funnel, bore through both ends; bbox = [inlet_d, inlet_d, height] (inlet_d >= outlet_d)"
      - "gridfinity_bin(grid_x=2, grid_y=1, height=35, wall=1.2, floor_t=4, lip=2.4)  // Gridfinity-compatible storage bin: 42 mm cells + stacking lip + scooped interior; bbox = [42*grid_x, 42*grid_y, height]"
      - "gridfinity_baseplate(grid_x=2, grid_y=2, height=6)  // Gridfinity-compatible baseplate: 42 mm cells each with a bin-foot cradle; bbox = [42*grid_x, 42*grid_y, height]"
      - "hex_nut_blank(hex_af=19, height=10, bore_d=13, fn=64)  // hex nut blank, thread relief only (smooth bore, no thread); bbox = [hex_af/cos(30), hex_af, height]"
      - "threaded_bolt(head_af=13, head_h=8, shaft_d=8, shaft_l=40, fn=64)  // hex-head bolt blank, thread relief only (smooth shaft, no thread); bbox = [head_af/cos(30), head_af, head_h + shaft_l]"
